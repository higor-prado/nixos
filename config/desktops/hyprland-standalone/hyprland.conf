# Hyprland user config — provisioned once, editable after.
# Changes here are preserved across nh os switch.

# Example keybinds (remove or edit as needed):
# bind = SUPER, Return, exec, kitty
# bind = SUPER, Q, killactive
# bind = SUPER, M, exit
# bind = $mainMod, SPACE, exec, rofi -show drun


# Auto-start waybar via systemd (clears failure counter from previous session)
exec-once = systemctl --user reset-failed waybar.service ; systemctl --user start waybar.service
