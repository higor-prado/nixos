# DMS on Hyprland overlay.
# This file is provisioned copy-once and may be tuned live.

exec-once = dms run

# Preserve the current DMS reserved-space intent from Niri:
# top 100, left 315, right 315.
monitor = , addreserved, 100, 0, 315, 315

bind = $mod, SPACE, exec, dms ipc call spotlight toggle
bind = $mod CTRL, T, exec, $terminal
bind = $mod CTRL, F, exec, $fileManager
bind = $mod CTRL, B, exec, $browser
bind = $mod CTRL, 1, exec, $editor
bind = $mod CTRL, Z, exec, $editor
bind = $mod CTRL, backslash, exec, $editor
bind = $mod CTRL, V, exec, $code
bind = $mod CTRL, E, exec, emacsclient -c -a ""
bind = $mod SHIFT, L, exec, dms ipc lock lock

bind = ALT, F4, killactive
bind = $mod, M, fullscreen, 0
bind = $mod, KP_Multiply, fullscreen, 0
bind = $mod ALT, slash, togglefloating
bind = $mod ALT, KP_Divide, togglefloating
bind = $mod, period, layoutmsg, fit active
bind = $mod, KP_Delete, layoutmsg, fit active
bind = $mod, comma, layoutmsg, colresize 1.0
bind = $mod, KP_Insert, layoutmsg, colresize 1.0

bind = $mod, left, layoutmsg, focus l
bind = $mod, right, layoutmsg, focus r
bind = $mod, KP_Left, layoutmsg, focus l
bind = $mod, KP_Right, layoutmsg, focus r
bind = $mod, H, layoutmsg, focus l
bind = $mod, L, layoutmsg, focus r
bind = $mod, down, movefocus, d
bind = $mod, up, movefocus, u
bind = $mod, KP_Begin, movefocus, d
bind = $mod, KP_Up, movefocus, u
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u

bind = $mod ALT, left, layoutmsg, swapcol l
bind = $mod ALT, right, layoutmsg, swapcol r
bind = $mod ALT, KP_Left, layoutmsg, swapcol l
bind = $mod ALT, KP_Right, layoutmsg, swapcol r
bind = $mod ALT, H, layoutmsg, swapcol l
bind = $mod ALT, L, layoutmsg, swapcol r
bind = $mod ALT, down, movewindow, d
bind = $mod ALT, up, movewindow, u
bind = $mod ALT, KP_Begin, movewindow, d
bind = $mod ALT, KP_Up, movewindow, u
bind = $mod ALT, J, movewindow, d
bind = $mod ALT, K, movewindow, u

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

bind = $mod ALT, 1, movetoworkspace, 1
bind = $mod ALT, 2, movetoworkspace, 2
bind = $mod ALT, 3, movetoworkspace, 3
bind = $mod ALT, 4, movetoworkspace, 4
bind = $mod ALT, 5, movetoworkspace, 5
bind = $mod ALT, 6, movetoworkspace, 6
bind = $mod ALT, 7, movetoworkspace, 7
bind = $mod ALT, 8, movetoworkspace, 8
bind = $mod ALT, 9, movetoworkspace, 9

bind = $mod, bracketleft, layoutmsg, colresize -0.1
bind = $mod, bracketright, layoutmsg, colresize +0.1
bind = $mod, G, layoutmsg, colresize +conf

# Niri-specific behaviors without a confirmed 1:1 Hyprland equivalent yet:
# - Super+Alt+BracketLeft / Super+Alt+BracketRight: preset window height
# - Super+Alt+G: preset window height cycle
# - Super+U: toggle column tabbed display
# - Mod+Ctrl+H/L and directional variants: consume / expel window
# - Super+D: overview

bindel = , XF86AudioRaiseVolume, exec, dms ipc audio increment 3
bindel = , XF86AudioLowerVolume, exec, dms ipc audio decrement 3
bindel = , XF86AudioMute, exec, dms ipc audio mute
bindel = , XF86AudioMicMute, exec, dms ipc audio micmute

bindl = , XF86AudioPlay, exec, dms ipc mpris playPause
bindl = , XF86AudioPause, exec, dms ipc mpris playPause
bindl = , XF86AudioNext, exec, dms ipc mpris next
bindl = , XF86AudioPrev, exec, dms ipc mpris previous

bindel = , XF86MonBrightnessUp, exec, dms ipc brightness increment 5 ""
bindel = , XF86MonBrightnessDown, exec, dms ipc brightness decrement 5 ""
