name = "powermenu-confirm-logout"
name_pretty = "Confirm Logout"
parent = "powermenu"
icon = "system-log-out"
fixed_order = true
hide_from_providerlist = true

[[entries]]
text = "Yes, logout"
subtext = "Exit Hyprland now"
icon = "dialog-ok"
actions = { "menus:default" = '''if hyprctl eval 'return true' >/dev/null 2>&1; then hyprctl dispatch 'hl.dsp.exit()'; else hyprctl dispatch exit; fi''' }

[[entries]]
text = "No, cancel"
subtext = "Return without logging out"
icon = "dialog-cancel"
actions = { "menus:default" = "true" }
