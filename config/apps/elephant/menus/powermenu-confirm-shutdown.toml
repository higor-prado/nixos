name = "powermenu-confirm-shutdown"
name_pretty = "Confirm Shutdown"
parent = "powermenu"
icon = "system-shutdown"
fixed_order = true
hide_from_providerlist = true

[[entries]]
text = "Yes, shutdown"
subtext = "Power off the machine now"
icon = "dialog-ok"
actions = { "menus:default" = "systemctl poweroff" }

[[entries]]
text = "No, cancel"
subtext = "Return without shutting down"
icon = "dialog-cancel"
actions = { "menus:default" = "true" }
